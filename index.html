<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin — Gestão de Escadas</title>
    <link rel="stylesheet" href="style.css">

    <!--
    =============================================================
    INDEX.HTML — PAINEL DO ADMINISTRADOR (PROTEGIDO)

    Proteção:
      - Ao carregar, verifica se há usuário logado no Firebase Auth
      - Se não estiver logado → redireciona para login.html
      - Se estiver logado → carrega o painel normalmente

    Dados em tempo real:
      - Usa Firestore onSnapshot() para escutar mudanças ao vivo
      - Cada vez que um técnico envia uma solicitação, a tabela
        atualiza automaticamente sem precisar recarregar a página

    Ações do admin:
      - Aprovar: muda status no Firestore + abre e-mail
      - Negar: muda status no Firestore
      - Limpar: apaga TODOS os documentos da coleção
    =============================================================
    -->

    <!-- Firebase SDKs necessários -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>

    <!-- Toast de notificação flutuante (canto inferior direito) -->
    <div id="toast" class="toast">
        <span id="toastIcone">✓</span>
        <span id="toastMsg">Ação realizada</span>
    </div>


    <!-- ======================================================
         CONTAINER PRINCIPAL DO PAINEL
    ====================================================== -->
    <div class="admin-container">

        <!-- ---- CABEÇALHO ---- -->
        <header class="admin-header">

            <!-- Lado esquerdo: ícone + título -->
            <div class="admin-header-info">
                <div class="admin-logo-icon" aria-hidden="true">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="4 20 4 14 10 14 10 8 16 8 16 2"/>
                        <line x1="4" y1="20" x2="20" y2="20"/>
                        <line x1="20" y1="2" x2="20" y2="20"/>
                    </svg>
                </div>
                <div>
                    <h1 class="admin-titulo">PAINEL <span style="color:var(--vermelho)">ADMIN</span></h1>
                    <p class="admin-subtitulo">Solicitações de Troca · Gestão de Escadas</p>
                </div>
            </div>

            <!-- Lado direito: indicador ao vivo + e-mail do admin + botões -->
            <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">

                <!-- Indicador de tempo real pulsante -->
                <div class="live-badge">
                    <div class="live-dot"></div>
                    AO VIVO
                </div>

                <!-- E-mail do admin logado (preenchido via JS) -->
                <span id="emailAdmin" style="font-size:13px; color:var(--branco-2);"></span>

                <!-- Botão de limpar histórico -->
                <button class="btn-limpar" onclick="limparHistorico()">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M9 6V4h6v2"/>
                    </svg>
                    Limpar
                </button>

                <!-- Botão de logout: encerra a sessão e volta ao login -->
                <button class="btn-logout" onclick="fazerLogout()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                    Sair
                </button>
            </div>
        </header>


        <!-- ---- CARDS DE MÉTRICAS ---- -->
        <!-- Atualizados automaticamente pelo listener do Firestore -->
        <div class="metricas-grid">
            <div class="metrica-card cinza">
                <p class="metrica-label">Total</p>
                <p class="metrica-valor" id="metTotal">—</p>
            </div>
            <div class="metrica-card amarelo">
                <p class="metrica-label">Pendentes</p>
                <p class="metrica-valor" id="metPendente">—</p>
            </div>
            <div class="metrica-card verde">
                <p class="metrica-label">Aprovadas</p>
                <p class="metrica-valor" id="metAprovado">—</p>
            </div>
            <div class="metrica-card">
                <p class="metrica-label">Negadas</p>
                <p class="metrica-valor" id="metRecusado">—</p>
            </div>
        </div>


        <!-- ---- TABELA DE SOLICITAÇÕES ---- -->
        <div class="tabela-wrapper">
            <table id="tabelaPedidos">
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Técnico</th>
                        <th>Escada</th>
                        <th>Problema</th>
                        <th>Evidência</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <!-- Populado dinamicamente via onSnapshot() do Firestore -->
                <tbody id="corpoTabela"></tbody>
            </table>
        </div>

    </div>


    <script>
        // ============================================================
        // CONFIGURAÇÃO E INICIALIZAÇÃO DO FIREBASE
        // ============================================================
        const firebaseConfig = {
            apiKey:            "AIzaSyCUhuBLRpfI_Rmha4nMIfrczCNezSmBzu4",
            authDomain:        "checklist-escadas.firebaseapp.com",
            projectId:         "checklist-escadas",
            storageBucket:     "checklist-escadas.firebasestorage.app",
            messagingSenderId: "749227587613",
            appId:             "1:749227587613:web:14ae5a1c33185ec028aef4"
        };

        firebase.initializeApp(firebaseConfig);

        const auth = firebase.auth();
        const db   = firebase.firestore(); // Referência ao banco Firestore


        // ============================================================
        // GUARDA DE ROTA — Protege o painel contra acesso não autorizado
        // onAuthStateChanged é chamado automaticamente pelo Firebase
        // toda vez que o estado de login muda.
        // ============================================================
        auth.onAuthStateChanged(function(usuario) {
            if (!usuario) {
                // Sem usuário logado → volta para o login
                window.location.href = 'login.html';
                return;
            }

            // ✅ Usuário logado: exibe o e-mail no cabeçalho
            document.getElementById('emailAdmin').textContent = usuario.email;

            // Inicia o listener em tempo real do Firestore
            iniciarListener();
        });


        // ============================================================
        // iniciarListener()
        // Usa onSnapshot() para escutar a coleção 'solicitacoes' no
        // Firestore em tempo real. Cada vez que um documento é
        // adicionado, alterado ou removido, a função é chamada
        // automaticamente com os dados atualizados.
        // ============================================================
        function iniciarListener() {

            db.collection('solicitacoes')
              .orderBy('timestamp', 'desc') // Mais recentes primeiro
              .onSnapshot(function(snapshot) {

                // snapshot.docs é o array de todos os documentos
                const lista = snapshot.docs.map(function(doc) {
                    return { id: doc.id, ...doc.data() };
                    // Adiciona o ID do documento junto com os dados
                });

                // Atualiza os cards de métrica com os novos totais
                atualizarMetricas(lista);

                // Re-renderiza a tabela com os dados mais recentes
                renderizarTabela(lista);

              }, function(erro) {
                // Callback de erro: exibe no console para depuração
                console.error("Erro ao escutar Firestore:", erro);
              });
        }


        // ============================================================
        // atualizarMetricas(lista)
        // Conta os itens por status e atualiza os 4 cards numéricos.
        // ============================================================
        function atualizarMetricas(lista) {
            document.getElementById('metTotal').textContent    = lista.length;
            document.getElementById('metPendente').textContent = lista.filter(i => i.status === 'Pendente').length;
            document.getElementById('metAprovado').textContent = lista.filter(i => i.status === 'Aprovado').length;
            document.getElementById('metRecusado').textContent = lista.filter(i => i.status === 'Recusado').length;
        }


        // ============================================================
        // renderizarTabela(lista)
        // Limpa e reconstrói a tabela com todos os documentos.
        // Filtra apenas status "Pendente" para ações.
        // ============================================================
        function renderizarTabela(lista) {

            const tabela = document.getElementById('corpoTabela');
            tabela.innerHTML = '';

            // Filtra apenas as pendentes para exibição com botões de ação
            const pendentes = lista.filter(s => s.status === 'Pendente');

            if (pendentes.length === 0) {
                tabela.innerHTML = `
                    <tr>
                        <td colspan="7">
                            <div class="estado-vazio">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                                    <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                                    <polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/>
                                </svg>
                                <p>Nenhuma solicitação pendente</p>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }

            // Cria uma linha para cada solicitação pendente
            pendentes.forEach(function(s) {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="white-space:nowrap; color:var(--branco-2); font-size:13px;">${s.data || '—'}</td>
                    <td><strong>${s.tecnico || '—'}</strong></td>
                    <td>
                        <span style="background:var(--vermelho-3); color:var(--vermelho-2); padding:4px 10px; border-radius:99px; font-size:12px; font-weight:600;">
                            ${s.escada || '—'}
                        </span>
                    </td>
                    <td style="max-width:200px; font-size:13px; color:var(--branco-2);">${s.problema || '—'}</td>
                    <td>
                        ${s.foto
                            ? `<img src="${s.foto}" class="thumb" onclick="window.open(this.src)" title="Clique para ampliar">`
                            : `<span style="color:var(--branco-3); font-size:12px;">Sem foto</span>`
                        }
                    </td>
                    <td><span class="badge badge-pendente">Pendente</span></td>
                    <td>
                        <div class="actions-group">
                            <button class="btn-ok" onclick="processar('${s.id}', 'Aprovado', ${JSON.stringify(s).replace(/'/g, "\\'")})">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
                                Aprovar
                            </button>
                            <button class="btn-no" onclick="processar('${s.id}', 'Recusado', null)">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                                Negar
                            </button>
                        </div>
                    </td>
                `;
                tabela.appendChild(tr);
            });
        }


        // ============================================================
        // processar(docId, decisao, item)
        // Atualiza o status do documento no Firestore.
        // Se aprovado, abre e-mail pré-preenchido.
        // docId: ID do documento no Firestore
        // decisao: 'Aprovado' ou 'Recusado'
        // item: objeto com dados (necessário para o e-mail)
        // ============================================================
   function processar(docId, decisao, item) {

    if (decisao === 'Aprovado' && item) {

        emailjs.init("mKipnyk8gseSW272E"); // ← cole sua chave pública aqui

        emailjs.send("service_yxctjnq", "template_xxk48xw", {
            escada:   item.escada,
            tecnico:  item.tecnico,
            re:       item.re,
            problema: item.problema,
            data:     item.data
        }).then(function() {
            console.log("✅ E-mail enviado ao almoxarifado!");
        }).catch(function(erro) {
            console.error("❌ Erro no e-mail:", erro);
        });
    }

    db.collection('solicitacoes').doc(docId)
      .update({ status: decisao })
      .then(function() {
          mostrarToast(
              decisao === 'Aprovado' ? 'toast-sucesso' : 'toast-erro',
              decisao === 'Aprovado' ? '✓ Aprovado e e-mail enviado' : '✗ Solicitação negada'
          );
      })
      .catch(function(erro) {
          console.error("Erro ao processar:", erro);
          mostrarToast('toast-erro', '✗ Erro ao processar. Tente novamente.');
      });
}

            // Atualiza o campo "status" do documento no Firestore
            // .update() modifica apenas os campos especificados
            db.collection('solicitacoes').doc(docId)
              .update({ status: decisao })
              .then(function() {
                  // Sucesso: o onSnapshot detecta a mudança e re-renderiza automaticamente
                  mostrarToast(
                      decisao === 'Aprovado' ? 'toast-sucesso' : 'toast-erro',
                      decisao === 'Aprovado' ? '✓ Aprovado e e-mail aberto' : '✗ Solicitação negada'
                  );
              })
              .catch(function(erro) {
                  console.error("Erro ao processar:", erro);
                  mostrarToast('toast-erro', '✗ Erro ao processar. Tente novamente.');
              });
        // ============================================================
        // limparHistorico()
        // Apaga TODOS os documentos da coleção 'solicitacoes'.
        // Usa um batch (lote) para deletar múltiplos documentos
        // de forma eficiente em uma única operação.
        // ============================================================
        function limparHistorico() {

            if (!confirm("Apagar TODAS as solicitações do banco de dados? Essa ação é irreversível.")) return;

            // Busca todos os documentos da coleção
            db.collection('solicitacoes').get()
              .then(function(snapshot) {

                  if (snapshot.empty) {
                      mostrarToast('toast-sucesso', '✓ Já está vazio');
                      return;
                  }

                  // Cria um batch: agrupa múltiplas operações em uma só
                  const batch = db.batch();

                  // Adiciona um delete para cada documento ao batch
                  snapshot.docs.forEach(function(doc) {
                      batch.delete(doc.ref);
                  });

                  // Executa todas as exclusões de uma vez
                  return batch.commit();
              })
              .then(function() {
                  mostrarToast('toast-sucesso', '✓ Histórico apagado com sucesso');
              })
              .catch(function(erro) {
                  console.error("Erro ao limpar:", erro);
                  mostrarToast('toast-erro', '✗ Erro ao limpar o histórico');
              });
        }


        // ============================================================
        // fazerLogout()
        // Encerra a sessão do Firebase e redireciona para o login.
        // ============================================================
        function fazerLogout() {
            auth.signOut().then(function() {
                window.location.href = 'login.html';
            });
        }


        // ============================================================
        // mostrarToast(tipo, mensagem)
        // Exibe notificação flutuante por 3 segundos.
        // ============================================================
        function mostrarToast(tipo, mensagem) {
            const toast = document.getElementById('toast');
            toast.classList.remove('toast-sucesso', 'toast-erro');
            toast.classList.add(tipo);
            document.getElementById('toastMsg').textContent = mensagem;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

    </script>

</body>
</html>
