<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitação de Troca — Escadas</title>

    <!-- Folha de estilos compartilhada do sistema -->
    <link rel="stylesheet" href="style.css">

    <!--
    =============================================================
    PÁGINA DO TÉCNICO — SOLICITAÇÃO DE TROCA DE ESCADA
    
    Esta página permite que o técnico de campo registre:
      - Identificação: nome e RE (registro de empregado)
      - Escada afetada: identificação
      - Problema encontrado: descrição textual
      - Evidência: foto da avaria (máx. 1 foto)
    
    Ao enviar, o registro é salvo no localStorage com
    status "Pendente" para análise no painel do admin.
    =============================================================
    -->
</head>
<body>

    <!-- ======================================================
         CONTAINER PRINCIPAL DO FORMULÁRIO
    ====================================================== -->
    <div class="container-tecnico">

        <!-- ---- CABEÇALHO DA PÁGINA ---- -->
        <div class="header-tecnico">
            <h1>TROCA DE <span>ESCADA</span></h1>
            <p>Solicitação para Almoxarifado · Sistema v2.0</p>
        </div>


        <!-- ======================================================
             CARD DO FORMULÁRIO
             Todos os campos ficam dentro deste card escuro.
        ====================================================== -->
        <div class="form-card">

            <!-- ---- CAMPO: NOME DO TÉCNICO ---- -->
            <div class="field">
                <label for="nome">Nome do Técnico *</label>
                <input 
                    type="text" 
                    id="nome" 
                    placeholder="Ex: Carlos Silva"
                    autocomplete="name"
                >
            </div>

            <!-- ---- CAMPO: RE (Registro de Empregado) ---- -->
            <div class="field">
                <label for="re">RE / Matrícula *</label>
                <input 
                    type="text" 
                    id="re" 
                    placeholder="Ex: 00123456"
                    inputmode="numeric"  <!-- abre teclado numérico em mobile -->
                >
            </div>

            <!-- ---- CAMPO: IDENTIFICAÇÃO DA ESCADA ---- -->
            <div class="field">
                <label for="escada">Escada Afetada *</label>
                <input 
                    type="text" 
                    id="escada" 
                    placeholder="Ex: ESC-001 / Corredor B"
                >
            </div>

            <!-- ---- CAMPO: DESCRIÇÃO DO PROBLEMA ---- -->
            <div class="field">
                <label for="problema">Problema Identificado *</label>
                <textarea 
                    id="problema" 
                    placeholder="Descreva o defeito ou avaria observada..."
                    rows="3"
                ></textarea>
            </div>

            <!-- ---- CAMPO: UPLOAD DE FOTO ---- -->
            <div class="field">
                <label>Foto da Evidência</label>

                <!--
                    O input type="file" está oculto via CSS.
                    O elemento <label> com "for" faz o papel do botão clicável.
                    Ao clicar no label, o navegador abre o seletor de arquivos.
                -->
                <label for="foto" class="label-file">
                    <!-- Ícone de câmera -->
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                        <circle cx="12" cy="13" r="4"/>
                    </svg>
                    <span id="labelFotoTexto">Selecionar foto da avaria</span>
                </label>

                <!--
                    accept="image/*" limita a seleção apenas para imagens.
                    onchange dispara handleFoto() quando o usuário escolhe um arquivo.
                -->
                <input 
                    type="file" 
                    id="foto" 
                    accept="image/*"
                    onchange="handleFoto(this.files)"
                >

                <!-- Área onde a miniatura da foto aparece após seleção -->
                <div id="preview"></div>
            </div>


            <!-- ---- BOTÃO DE ENVIO ---- -->
            <!--
                O onclick chama enviarSolicitacao() que valida os campos
                e salva no localStorage com status "Pendente".
            -->
            <button class="btn-enviar" onclick="enviarSolicitacao()">
                ENVIAR SOLICITAÇÃO
            </button>

        </div>
        <!-- FIM CARD DO FORMULÁRIO -->

        <!-- Mensagem de rodapé -->
        <p style="text-align:center; color:var(--branco-3); font-size:12px; margin-top:16px;">
            * Campos obrigatórios
        </p>

    </div>
    <!-- FIM CONTAINER PRINCIPAL -->


    <!-- ======================================================
         JAVASCRIPT DA PÁGINA DO TÉCNICO
    ====================================================== -->
    <script>

        // Variável global que armazena o base64 da foto selecionada
        // (começa como null = nenhuma foto)
        let fotoBase64 = null;


        // --------------------------------------------------------
        // handleFoto(files)
        // Chamada quando o usuário seleciona um arquivo.
        // Lê o arquivo como base64 e exibe a miniatura.
        // --------------------------------------------------------
        function handleFoto(files) {

            // Se nenhum arquivo foi selecionado, encerra
            if (!files || files.length === 0) return;

            const arquivo = files[0]; // Pega só o primeiro arquivo

            // FileReader converte o arquivo para base64 (formato data URL)
            const reader = new FileReader();

            // Callback: executado quando a leitura terminar
            reader.onload = function(e) {
                fotoBase64 = e.target.result; // Salva o base64 na variável global

                // Atualiza o label do botão com o nome do arquivo
                document.getElementById('labelFotoTexto').textContent = arquivo.name;

                // Renderiza a miniatura no div de preview
                const preview = document.getElementById('preview');
                preview.innerHTML = `<img src="${fotoBase64}" alt="Pré-visualização da evidência">`;
            };

            // Inicia a leitura do arquivo como Data URL (base64)
            reader.readAsDataURL(arquivo);
        }


        // --------------------------------------------------------
        // enviarSolicitacao()
        // Valida os campos, monta o objeto de solicitação e
        // salva no localStorage com status "Pendente".
        // --------------------------------------------------------
        function enviarSolicitacao() {

            // Lê os valores de cada campo, removendo espaços extras
            const nome     = document.getElementById('nome').value.trim();
            const re       = document.getElementById('re').value.trim();
            const escada   = document.getElementById('escada').value.trim();
            const problema = document.getElementById('problema').value.trim();

            // ---- VALIDAÇÃO: campos obrigatórios ----
            if (!nome || !re || !escada || !problema) {
                // Destaca visualmente os campos vazios
                ['nome', 're', 'escada', 'problema'].forEach(id => {
                    const el = document.getElementById(id);
                    if (!el.value.trim()) {
                        // Borda vermelha temporária no campo inválido
                        el.style.borderColor = 'var(--vermelho)';
                        el.style.boxShadow = '0 0 0 3px rgba(232, 0, 28, 0.2)';

                        // Remove o destaque após 2 segundos
                        setTimeout(() => {
                            el.style.borderColor = '';
                            el.style.boxShadow = '';
                        }, 2000);
                    }
                });

                alert("⚠️ Preencha todos os campos obrigatórios!");
                return; // Para a execução
            }

            // ---- MONTA O OBJETO DA SOLICITAÇÃO ----
            const agora = new Date();

            const solicitacao = {
                id:       Date.now(),          // ID único baseado no timestamp
                tecnico:  nome.toUpperCase(),  // Nome em maiúsculas para padronizar
                re:       re,
                escada:   escada.toUpperCase(),
                problema: problema,
                foto:     fotoBase64 || '',    // Base64 da foto, ou vazio se não selecionada
                data:     agora.toLocaleDateString('pt-BR'),   // "dd/mm/aaaa"
                hora:     agora.toLocaleTimeString('pt-BR', {  // "HH:MM"
                              hour: '2-digit', 
                              minute: '2-digit'
                          }),
                mes:      agora.getMonth() + 1, // Número do mês (1-12)
                status:   'Pendente'             // Status inicial: aguardando análise
            };

            // ---- SALVA NO LOCALSTORAGE ----
            // Carrega o array existente (ou cria um novo se não existir)
            let historico = JSON.parse(localStorage.getItem('bd_escadas') || '[]');

            // Adiciona a nova solicitação ao final do array
            historico.push(solicitacao);

            // Salva de volta no localStorage como string JSON
            localStorage.setItem('bd_escadas', JSON.stringify(historico));

            // ---- FEEDBACK E RESET ----
            alert(`✅ Solicitação enviada com sucesso!\n\nEscada: ${solicitacao.escada}\nStatus: Pendente de aprovação`);

            // Limpa todos os campos do formulário
            document.getElementById('nome').value     = '';
            document.getElementById('re').value       = '';
            document.getElementById('escada').value   = '';
            document.getElementById('problema').value = '';

            // Limpa a foto
            document.getElementById('foto').value = '';
            document.getElementById('preview').innerHTML = '';
            document.getElementById('labelFotoTexto').textContent = 'Selecionar foto da avaria';
            fotoBase64 = null;
        }

    </script>

</body>
</html>
