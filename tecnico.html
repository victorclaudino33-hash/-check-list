<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitação de Troca — Escadas</title>
    <link rel="stylesheet" href="style.css">

    <!--
    =============================================================
    TECNICO.HTML — FORMULÁRIO PÚBLICO DO TÉCNICO

    Acesso: link direto, sem necessidade de login.
    O técnico preenche os dados e a solicitação vai direto
    para o Firestore, aparecendo no painel do admin em tempo real.

    Fluxo:
      1. Técnico abre o link (WhatsApp/e-mail/QR Code)
      2. Preenche: nome, RE, escada, problema, foto
      3. Clica em "Enviar Solicitação"
      4. Dados salvos no Firestore com status "Pendente"
      5. Admin vê a solicitação aparecer no painel instantaneamente
    =============================================================
    -->

    <!-- Firebase SDKs: App + Firestore (sem Auth — acesso público) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <div class="container-tecnico">

        <!-- Cabeçalho -->
        <div class="header-tecnico">
            <h1>TROCA DE <span>ESCADA</span></h1>
            <p>Solicitação ao Almoxarifado · Preencha todos os campos</p>
        </div>

        <!-- Card do formulário -->
        <div class="form-card">

            <!-- Nome do técnico -->
            <div class="field">
                <label for="nome">Nome do Técnico *</label>
                <input type="text" id="nome" placeholder="Ex: Carlos Silva" autocomplete="name">
            </div>

            <!-- RE / Matrícula -->
            <div class="field">
                <label for="re">RE / Matrícula *</label>
                <input type="text" id="re" placeholder="Ex: 00123456" inputmode="numeric">
            </div>

            <!-- Identificação da escada -->
            <div class="field">
                <label for="escada">Escada Afetada *</label>
                <input type="text" id="escada" placeholder="Ex: ESC-001 / Corredor B">
            </div>

            <!-- Descrição do problema -->
            <div class="field">
                <label for="problema">Problema Identificado *</label>
                <textarea id="problema" placeholder="Descreva o defeito ou avaria observada..." rows="3"></textarea>
            </div>

            <!-- Upload de foto (opcional mas recomendado) -->
            <div class="field">
                <label>Foto da Evidência <span style="color:var(--branco-3); font-weight:400;">(opcional)</span></label>
                <label for="foto" class="label-file">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                        <circle cx="12" cy="13" r="4"/>
                    </svg>
                    <span id="labelFotoTexto">Selecionar foto da avaria</span>
                </label>
                <input type="file" id="foto" accept="image/*" onchange="handleFoto(this.files)">
                <div id="preview"></div>
            </div>

            <!--
                Botão de envio.
                Muda para estado de carregando durante o envio ao Firestore.
                Volta ao normal após sucesso ou erro.
            -->
            <button class="btn-enviar" id="btnEnviar" onclick="enviarSolicitacao()">
                ENVIAR SOLICITAÇÃO
            </button>

        </div>

        <p style="text-align:center; color:var(--branco-3); font-size:12px; margin-top:16px;">
            * Campos obrigatórios · Seus dados vão direto para o administrador
        </p>

    </div>


    <script>
        // ============================================================
        // CONFIGURAÇÃO DO FIREBASE
        // ============================================================
        const firebaseConfig = {
            apiKey:            "AIzaSyCUhuBLRpfI_Rmha4nMIfrczCNezSmBzu4",
            authDomain:        "checklist-escadas.firebaseapp.com",
            projectId:         "checklist-escadas",
            storageBucket:     "checklist-escadas.firebasestorage.app",
            messagingSenderId: "749227587613",
            appId:             "1:749227587613:web:14ae5a1c33185ec028aef4"
        };

        firebase.initializeApp(firebaseConfig);

        // Referência ao Firestore (banco de dados)
        const db = firebase.firestore();

        // Variável global para a foto em base64
        let fotoBase64 = null;


        // ============================================================
        // handleFoto(files)
        // Lê o arquivo de imagem e converte para base64.
        // Base64 é uma string que representa a imagem — pode ser
        // salva diretamente no Firestore como texto.
        // ============================================================
        function handleFoto(files) {
            if (!files || files.length === 0) return;

            const arquivo = files[0];

            // Avisa se o arquivo for maior que 1MB
            // (Firestore tem limite de 1MB por documento)
            if (arquivo.size > 1048576) {
                alert("⚠️ Foto muito grande! Use uma imagem menor que 1MB.");
                return;
            }

            const reader = new FileReader();

            reader.onload = function(e) {
                fotoBase64 = e.target.result;
                document.getElementById('labelFotoTexto').textContent = arquivo.name;
                document.getElementById('preview').innerHTML =
                    `<img src="${fotoBase64}" alt="Pré-visualização">`;
            };

            reader.readAsDataURL(arquivo);
        }


        // ============================================================
        // enviarSolicitacao()
        // Valida os campos e salva o documento no Firestore.
        // .add() cria um novo documento com ID automático.
        // ============================================================
        function enviarSolicitacao() {

            // Lê e limpa os valores dos campos
            const nome     = document.getElementById('nome').value.trim();
            const re       = document.getElementById('re').value.trim();
            const escada   = document.getElementById('escada').value.trim();
            const problema = document.getElementById('problema').value.trim();

            // Validação: destaca campos vazios
            if (!nome || !re || !escada || !problema) {
                ['nome', 're', 'escada', 'problema'].forEach(function(id) {
                    const el = document.getElementById(id);
                    if (!el.value.trim()) {
                        el.style.borderColor = 'var(--vermelho)';
                        el.style.boxShadow   = '0 0 0 3px rgba(232,0,28,0.2)';
                        setTimeout(function() {
                            el.style.borderColor = '';
                            el.style.boxShadow   = '';
                        }, 2500);
                    }
                });
                alert("⚠️ Preencha todos os campos obrigatórios!");
                return;
            }

            // Muda o botão para estado de carregamento
            const btn = document.getElementById('btnEnviar');
            btn.disabled = true;
            btn.textContent = 'ENVIANDO...';

            // Monta o timestamp atual para ordenação no Firestore
            const agora = new Date();

            // ---- OBJETO DO DOCUMENTO ----
            // Este é o dado que será salvo no Firestore
            const solicitacao = {
                tecnico:   nome.toUpperCase(),
                re:        re,
                escada:    escada.toUpperCase(),
                problema:  problema,
                foto:      fotoBase64 || null,   // null se não enviou foto
                data:      agora.toLocaleDateString('pt-BR'),
                hora:      agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }),
                status:    'Pendente',            // Status inicial
                // timestamp é usado para ordenar por data no painel do admin
                // serverTimestamp() usa o horário do servidor Firebase (mais confiável)
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            };

            // ---- SALVA NO FIRESTORE ----
            // db.collection('solicitacoes').add() cria um novo documento
            // na coleção 'solicitacoes' com ID gerado automaticamente
            db.collection('solicitacoes').add(solicitacao)
                .then(function(docRef) {
                    // ✅ Documento salvo com sucesso
                    // docRef.id é o ID gerado pelo Firestore

                    alert(`✅ Solicitação enviada com sucesso!\n\nEscada: ${solicitacao.escada}\nAguardando aprovação do administrador.`);

                    // Reseta o formulário
                    ['nome', 're', 'escada', 'problema'].forEach(id => document.getElementById(id).value = '');
                    document.getElementById('foto').value = '';
                    document.getElementById('preview').innerHTML = '';
                    document.getElementById('labelFotoTexto').textContent = 'Selecionar foto da avaria';
                    fotoBase64 = null;

                    // Restaura o botão
                    btn.disabled = false;
                    btn.textContent = 'ENVIAR SOLICITAÇÃO';
                })
                .catch(function(erro) {
                    // ❌ Erro ao salvar
                    console.error("Erro ao enviar:", erro);
                    alert("❌ Erro ao enviar. Verifique sua conexão e tente novamente.");

                    btn.disabled = false;
                    btn.textContent = 'ENVIAR SOLICITAÇÃO';
                });
        }

    </script>

</body>
</html>
